name: Build and Release Skill

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          cd Contacts-by-XPhoone-Insights-Builder-Skill
          zip -r ../Contacts-by-XPhoone-Insights-Builder-Skill.zip .

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: Contacts-by-XPhoone-Insights-Builder-Skill.zip
